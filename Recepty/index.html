<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepty | Databáze</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">Recepty</div>
    <button class="btn btn-outline" onclick="openModal()">+ Přidat recept</button>
</nav>

<header class="hero">
    <h1>Najděte své další jídlo</h1>
    <p>Prohledávejte tisíce receptů podle ingrediencí, diety nebo kuchyně.</p>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Hledat kuře, těstoviny, vegan...">
        <select id="dietFilter">
            <option value="all">Jakákoliv dieta</option>
            <option value="Vegan">Vegan</option>
            <option value="Keto">Keto</option>
            <option value="Gluten-Free">Bez lepku</option>
        </select>
        <button class="btn btn-primary" onclick="searchRecipes()">Hledat</button>
    </div>
</header>

<main class="container">
    <div class="recipe-grid" id="recipeContainer">
    </div>
</main>

<div id="recipeModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2>Přidat nový recept</h2>
        <form id="addRecipeForm" onsubmit="submitRecipe(event)">
            <input type="text" id="newTitle" placeholder="Název receptu" required>
            <input type="text" id="newDesc" placeholder="Krátký popis" required>
            
            <div class="time-row">
                <input type="number" id="newPrep" placeholder="Příprava (min)" required>
                <input type="number" id="newCook" placeholder="Vaření (min)" required>
            </div>
            <select id="newDiet">
                <option value="Standard">Standardní</option>
                <option value="Vegan">Vegan</option>
                <option value="Keto">Keto</option>
                <option value="Gluten-Free">Bez lepku</option>
            </select>

            <hr class="modal-hr">
            <h3 class="modal-section-title">Ingredience</h3>
            <div id="ingredientList">
                <div class="ingredient-row">
                    <input type="text" class="ing-name" placeholder="Název (např. Česnek)" required>
                    <input type="number" step="0.1" class="ing-qty" placeholder="Množství" required>
                    <input type="text" class="ing-unit" placeholder="Jednotka (např. g)">
                </div>
            </div>
            <button type="button" class="btn btn-outline btn-small" onclick="addIngredientRow()">+ Přidat další ingredienci</button>

            <hr class="modal-hr">
            <h3 class="modal-section-title">Postup</h3>
            <div id="stepList">
                <div class="step-row">
                    <span class="step-number">1.</span>
                    <textarea class="step-desc" placeholder="Popište tento krok..." required></textarea>
                </div>
            </div>
            <button type="button" class="btn btn-outline btn-small" onclick="addStepRow()">+ Přidat další krok</button>

            <hr class="modal-hr-transparent">
            <button type="submit" class="btn btn-primary">Uložit recept</button>
        </form>
    </div>
</div>

<div id="detailsModal" class="modal">
    <div class="modal-content modal-wide">
        <span class="close-btn" onclick="closeDetailsModal()">&times;</span>

        <h2 id="detailTitle">Název receptu</h2>
        <p id="detailDesc" class="details-desc">Popis</p>

        <div class="details-container">
            <div class="details-column">
                <h3>🛒 Ingredience</h3>
                <ul id="detailIngredients" class="details-list"></ul>
            </div>

            <div class="details-column-wide">
                <h3>🧑‍🍳 Postup</h3>
                <ol id="detailSteps" class="details-list"></ol>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
